id: cervical_collar
schema_version: 1
title:
  zh-Hant: 上頸圈
description:
  zh-Hant: 為疑似頸椎傷患套上頸圈,避免次發性脊髓損傷
body_region: neck
illustration: /illustrations/scenes/cervical_collar.svg
catalog:
  summary:
    zh-Hant: 從徒手固定、頸部評估、選擇尺寸到完成頸圈固定。
  difficulty: beginner
  estimated_minutes: 3
  section:
    zh-Hant: 創傷處置
  tags:
    - { zh-Hant: 頸椎保護 }
    - { zh-Hant: 器材操作 }
  featured: true
  sort: 10
steps:
  - id: ppe
    action_id: wear_ppe
    tip:
      zh-Hant: BSI 為所有接觸病人前的標準動作
  - id: stabilize
    action_id: manual_inline_stabilization
    tip:
      zh-Hant: 副手雙手扶住病人頭兩側,維持中立位,直到頸圈完全固定
  - id: assess_neck
    action_id: secondary_survey
    tip:
      zh-Hant: 套頸圈前先檢查頸部:腫脹、變形、皮下氣腫、氣管偏移
  - id: pick_size
    action_id: cervical_collar_pick_size
    tip:
      zh-Hant: 病人下顎到斜方肌頂端的指距,選對應頸圈
  - id: apply
    action_id: cervical_collar_apply
    tip:
      zh-Hant: 後片先就位、前片包覆,確認下巴落在凹槽,黏扣帶確實貼緊
