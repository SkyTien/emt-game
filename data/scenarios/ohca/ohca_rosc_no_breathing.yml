id: ohca_rosc_no_breathing
schema_version: 1
hidden: true
extends: ohca_adult_street
title:
  zh-Hant: 路倒成人救護
catalog:
  quick_play: true
phases:
  - id: post_aed_assess
    narrative:
      zh-Hant: 電擊後你立即恢復按壓。數輪 CPR 後，你摸到頸動脈出現規律跳動——病人有脈搏了。但觀察胸廓，未見自主起伏，病人仍無呼吸。
    hint:
      zh-Hant: 確認 ROSC 後先摸脈搏、再評估呼吸；無自主呼吸需繼續 BVM 輔助通氣，密切監測生命徵象。
    required:
      - action_id: check_pulse_carotid
        by: lead
      - action_id: check_breath
        by: lead
        after: check_pulse_carotid
    timeout: 30
    on_skip:
      worsen: 1
      note:
        zh-Hant: 未再評估脈搏與呼吸，無法確認 ROSC 狀態。
  - id: post_rosc_bvm
    narrative:
      zh-Hant: 病人有脈搏但無自主呼吸，需持續 BVM 輔助通氣並監測，準備送醫。
    hint:
      zh-Hant: 無自主呼吸時繼續 BVM 通氣（每 5~6 秒一次），監測血氧與脈搏，並準備 ISBAR 交班。
    required:
      - action_id: bvm_ventilate
        by: assist
      - action_id: measure_spo2
        by: lead
      - action_id: check_pulse_carotid
        by: lead
      - action_id: isbar_handoff
        by: lead
    timeout: 60
    on_skip:
      worsen: 2
      note:
        zh-Hant: 未持續 BVM 輔助通氣，缺氧加劇腦損傷。
outcomes:
  - id: rosc_ventilated
    when: 已電擊 且 正確率>=0.85
    title:
      zh-Hant: ROSC — 恢復循環、持續輔助通氣送醫
    text:
      zh-Hant: 高品質 CPR 與電擊後病人恢復自主循環，持續 BVM 輔助通氣維持氧合，送醫後由急診接手進一步處置。
    illustration: /illustrations/outcomes/rosc.svg
  - id: rosc_poor
    when: 已電擊
    title:
      zh-Hant: ROSC 但處置細節待加強
    text:
      zh-Hant: 病人雖恢復循環，但部分流程有延誤。請回顧時間軸找出可以改進的環節。
    illustration: /illustrations/outcomes/rosc.svg
  - id: doa
    when: 預設
    title:
      zh-Hant: 到院前 DOA
    text:
      zh-Hant: 多項關鍵動作延誤，病人到院前無生命徵象。請檢視時間軸看哪些步驟可以更快。
    illustration: /illustrations/outcomes/doa.svg
