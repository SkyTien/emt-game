id: motorcycle_trauma
schema_version: 1
title:
  zh-Hant: 交通事故救護
illustration: /illustrations/scenes/motorcycle_trauma.png
player_role: either
patient_initial:
  consciousness:
    zh-Hant: 嗜睡可喚醒
  breath:
    zh-Hant: 略淺快
  pulse:
    zh-Hant: 110 弱
crew:
  lead:
    role: lead
    carries:
      - jumpkit
    duty:
      zh-Hant: 主導評估、長背板、ISBAR
  assist:
    role: assist
    carries:
      - o2kit
    duty:
      zh-Hant: 徒手固定頭部、止血、紀錄
phases:
  - id: scene_control
    illustration: /illustrations/scenes/motorcycle_trauma.png
    narrative:
      zh-Hant: 雙線道公路上，一輛機車倒地，30 多歲男性駕駛仰躺路面，頭盔已脫落，現場車流仍未完全管制。
    hint:
      zh-Hant: 在接觸病人前，應優先管制現場交通秩序並做好 BSI 自我防護。
    required:
      - action_id: check_scene_safe
      - action_id: scene_traffic_control
      - action_id: wear_ppe
    timeout: 45
    on_skip:
      worsen: 1
      note:
        zh-Hant: 未管制現場,後方來車可能造成二次事故。
  - id: c_spine
    narrative:
      zh-Hant: 根據事故機制分析，病人有高度頸椎損傷風險。
    hint:
      zh-Hant: 應先穩定頭頸部（徒手固定）避免脊髓損傷，並評估患者的基本意識程度。
    required:
      - action_id: manual_inline_stabilization
        by: partner
      - action_id: check_consciousness_avpu
    timeout: 30
    on_skip:
      worsen: 2
      note:
        zh-Hant: 沒固定頸椎就移動病人,可能造成脊髓損傷。
  - id: bleeding_x
    narrative:
      zh-Hant: 快速目視全身發現右大腿外側有明顯大量出血。
    hint:
      zh-Hant: 創傷流程的 X(eXsanguinating)優先,先壓制致命性出血,再進入 ABC。
    required:
      - action_id: control_bleeding_pressure
        by: player
    timeout: 45
    on_skip:
      worsen: 2
      note:
        zh-Hant: 未先處理大量出血,休克快速進展。
  - id: airway
    narrative:
      zh-Hant: 出血已初步壓制。病人嗜睡,呼吸道內似有少量血絲與口水。
    hint:
      zh-Hant: 創傷疑似頸椎傷,以下顎推舉打開氣道而非後仰頭部。
    required:
      - action_id: check_airway
      - action_id: open_airway_jaw_thrust
        by: player
    timeout: 45
    on_skip:
      worsen: 2
      note:
        zh-Hant: 氣道未維持,缺氧加劇腦損傷。
  - id: breathing
    narrative:
      zh-Hant: 氣道暢通,呼吸 24 次/分、略淺。
    hint:
      zh-Hant: 創傷病人應立即以 NRM 給予高濃度氧氣。
    required:
      - action_id: check_breath
      - action_id: oxygen_nrm
        by: partner
    timeout: 45
    on_skip:
      worsen: 1
      note:
        zh-Hant: 未給高濃度氧,組織灌流惡化。
  - id: circulation
    narrative:
      zh-Hant: 病人皮膚蒼白濕冷,橈動脈微弱快速。
    hint:
      zh-Hant: 確認循環徵象並準備後續處置。
    required:
      - action_id: check_pulse_radial
      - action_id: check_skin_signs
    timeout: 45
    on_skip:
      worsen: 1
      note:
        zh-Hant: 未掌握循環徵象,延誤休克判斷。
  - id: disability
    narrative:
      zh-Hant: 進入 D 神經評估,確認意識與瞳孔。
    hint:
      zh-Hant: 檢查瞳孔對光反應與大小對稱,評估中樞神經狀況。
    required:
      - action_id: check_pupils
    timeout: 45
    on_skip:
      worsen: 1
      note:
        zh-Hant: 未評估瞳孔,失去顱內變化的指標。
  - id: exposure
    narrative:
      zh-Hant: 進入 E 暴露評估,檢查其他隱性傷口。
    hint:
      zh-Hant: 必要時掀開衣物找隱性傷口,評估後注意保暖。
    required:
      - action_id: assess_exposure
        by: player
    timeout: 45
    on_skip:
      worsen: 1
      note:
        zh-Hant: 未做暴露評估,漏掉其他傷處或失溫。
  - id: bleeding_splint
    narrative:
      zh-Hant: 完成初評後,進一步固定骨折部位減少二次傷。
    hint:
      zh-Hant: 二度評估後針對骨折部位進行副木固定。
    required:
      - action_id: secondary_survey
      - action_id: splint_extremity
    timeout: 90
    on_skip:
      worsen: 1
      note:
        zh-Hant: 未及時固定,移送途中骨折錯位惡化。
  - id: collar_board
    narrative:
      zh-Hant: 出血已初步控制，準備進行長距離移送前的固定。
    hint:
      zh-Hant: 應先為病人套上合適尺寸的頸圈，隨後實施長背板固定以保護脊椎。
    required:
      - action_id: cervical_collar_pick_size
      - action_id: cervical_collar_apply
      - action_id: long_board_immobilize
    timeout: 90
    on_skip:
      worsen: 1
      note:
        zh-Hant: 脊椎固定不確實,移送途中變形。
  - id: transport
    narrative:
      zh-Hant: 病人已完成初步固定，正準備啟程前往外傷中心。
    hint:
      zh-Hant: 將病人移上救護車並全速送醫，途中應維持生命徵象監測並準備 ISBAR 交班。
    required:
      - action_id: load_into_ambulance
      - action_id: transport_to_hospital
      - action_id: isbar_handoff
    timeout: 60
    on_skip:
      worsen: 1
      note:
        zh-Hant: 送醫延遲、交班不完整。
outcomes:
  - id: stable
    when: 正確率>=0.85 且 惡化等級<2
    title:
      zh-Hant: 病人到院時生命徵象穩定
    text:
      zh-Hant: 完整的脊椎固定與及時止血,病人送達外傷中心時意識回復、循環穩定。
    illustration: /illustrations/outcomes/stable.png
  - id: hemorrhagic_shock
    when: 惡化等級>=2
    title:
      zh-Hant: 到院時出血性休克
    text:
      zh-Hant: 多項延誤導致病人到院時呈現休克。請回看時間軸找出可以更快處理的環節。
    illustration: /illustrations/outcomes/shock.png
  - id: bad_handoff
    when: 預設
    title:
      zh-Hant: 到院後仍需密切觀察
    text:
      zh-Hant: 雖然到院但流程不夠完整。請再來一次精進。
    illustration: /illustrations/outcomes/handoff.png
