<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">自主呼吸與準備送醫</title>
  <desc id="desc">患者生命徵象穩定並恢復自主呼吸。兩名救護技術員正合力將躺在擔架床上的患者推向救護車，準備進行安全轉運。</desc>

  <!-- Ground Line -->
  <line x1="50" y1="400" x2="750" y2="400" stroke="#18181b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Subtle Ambulance Background Frame (Light Gray) -->
  <path d="M 120 400 L 120 110 A 25 25 0 0 1 145 85 L 655 85 A 25 25 0 0 1 680 110 L 680 400" fill="none" stroke="#e4e4e7" stroke-width="2" stroke-linecap="round"/>
  <path d="M 120 110 L 50 130 L 50 380 L 120 360" fill="none" stroke="#e4e4e7" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 680 110 L 750 130 L 750 380 L 680 360" fill="none" stroke="#e4e4e7" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Ambulance tail lights (light gray outlines) -->
  <rect x="130" y="320" width="10" height="30" rx="2" fill="none" stroke="#e4e4e7" stroke-width="1.5"/>
  <rect x="660" y="320" width="10" height="30" rx="2" fill="none" stroke="#e4e4e7" stroke-width="1.5"/>

  <!-- Stretcher Structure -->
  <!-- Stretcher Wheels -->
  <circle cx="300" cy="370" r="30" fill="#ffffff" stroke="#18181b" stroke-width="2.5"/>
  <circle cx="300" cy="370" r="8" fill="#18181b"/>
  <circle cx="500" cy="370" r="30" fill="#ffffff" stroke="#18181b" stroke-width="2.5"/>
  <circle cx="500" cy="370" r="8" fill="#18181b"/>

  <!-- X-Frame Legs -->
  <line x1="300" y1="370" x2="500" y2="280" stroke="#18181b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="500" y1="370" x2="300" y2="280" stroke="#18181b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="400" cy="325" r="6" fill="#ffffff" stroke="#18181b" stroke-width="2.5"/>

  <!-- Stretcher Lower Tray / Oxygen Tank Rack -->
  <line x1="260" y1="320" x2="540" y2="320" stroke="#18181b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Oxygen Cylinder on the lower shelf -->
  <rect x="360" y="302" width="70" height="15" rx="4" fill="#ffffff" stroke="#18181b" stroke-width="2"/>
  <path d="M 430 305 L 435 305 L 435 314 L 430 314" fill="none" stroke="#18181b" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="438" cy="309.5" r="2.5" fill="#18181b"/>

  <!-- Stretcher Bed Base & Mattress -->
  <rect x="230" y="260" width="340" height="20" rx="5" fill="#ffffff" stroke="#18181b" stroke-width="2.5"/>
  <!-- Elevated Headrest -->
  <path d="M 245 260 L 195 230 C 190 225, 195 215, 205 220 L 250 250 Z" fill="#ffffff" stroke="#18181b" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Stretcher Handles -->
  <path d="M 195 230 L 175 235 A 4 4 0 0 0 175 243 L 195 240" fill="none" stroke="#18181b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 570 270 L 590 270 A 4 4 0 0 0 590 262 L 570 262" fill="none" stroke="#18181b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Patient Lying Peacefully -->
  <!-- Pillow -->
  <path d="M 195 220 L 210 210 L 225 223 Z" fill="#f4f4f5" stroke="#18181b" stroke-width="2" stroke-linejoin="round"/>
  <!-- Head -->
  <circle cx="218" cy="190" r="16" fill="#ffffff" stroke="#18181b" stroke-width="2.5"/>
  <!-- Face details (closed eyes & gentle smile) -->
  <path d="M 210 190 Q 214 194 218 190" fill="none" stroke="#18181b" stroke-width="2" stroke-linecap="round"/>
  <path d="M 218 197 Q 221 199 223 196" fill="none" stroke="#18181b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nasal Cannula -->
  <path d="M 218 195 C 220 205, 225 215, 235 230" fill="none" stroke="#18181b" stroke-width="1.5" stroke-dasharray="3,3" stroke-linecap="round"/>
  <!-- Patient's body covered in blanket -->
  <path d="M 230 225 C 250 220, 270 235, 300 235 L 565 235 C 570 235, 570 245, 570 260 L 245 260 Z" fill="#ffffff" stroke="#18181b" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Blanket folds -->
  <path d="M 290 235 Q 330 245 370 235" fill="none" stroke="#18181b" stroke-width="2" stroke-linecap="round"/>
  <path d="M 400 235 Q 440 245 480 235" fill="none" stroke="#18181b" stroke-width="2" stroke-linecap="round"/>

  <!-- EMT 1 (Left - standing, holding head-end handle) -->
  <!-- Legs -->
  <path d="M 140 280 L 135 395" stroke="#18181b" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 160 280 L 165 395" stroke="#18181b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Boots -->
  <path d="M 125 395 L 140 395" stroke="#18181b" stroke-width="3" stroke-linecap="round"/>
  <path d="M 160 395 L 175 395" stroke="#18181b" stroke-width="3" stroke-linecap="round"/>
  <!-- Torso (jacket & reflective stripes) -->
  <rect x="130" y="185" width="40" height="95" rx="8" fill="#ffffff" stroke="#18181b" stroke-width="2.5"/>
  <path d="M 130 205 L 170 205" stroke="#18181b" stroke-width="2" stroke-linecap="round"/>
  <path d="M 130 235 L 170 235" stroke="#18181b" stroke-width="2" stroke-linecap="round"/>
  <path d="M 130 265 L 170 265" stroke="#18181b" stroke-width="2" stroke-linecap="round"/>
  <!-- Arm holding handle -->
  <path d="M 165 200 C 180 210, 180 225, 178 232" fill="none" stroke="#18181b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="178" cy="235" r="4.5" fill="#ffffff" stroke="#18181b" stroke-width="2"/>
  <!-- Head -->
  <circle cx="150" cy="160" r="16" fill="#ffffff" stroke="#18181b" stroke-width="2.5"/>
  <!-- Cap (EMT cap) -->
  <path d="M 134 158 A 16 16 0 0 1 166 158 L 174 158" fill="none" stroke="#18181b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Eye & gentle smile -->
  <circle cx="156" cy="160" r="1" fill="#18181b"/>
  <path d="M 157 166 Q 160 168 162 165" fill="none" stroke="#18181b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- EMT 2 (Right - standing, checking clipboard) -->
  <!-- Legs -->
  <path d="M 640 280 L 635 395" stroke="#18181b" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 660 280 L 665 395" stroke="#18181b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Boots -->
  <path d="M 625 395 L 640 395" stroke="#18181b" stroke-width="3" stroke-linecap="round"/>
  <path d="M 660 395 L 675 395" stroke="#18181b" stroke-width="3" stroke-linecap="round"/>
  <!-- Torso (jacket & reflective stripes) -->
  <rect x="630" y="185" width="40" height="95" rx="8" fill="#ffffff" stroke="#18181b" stroke-width="2.5"/>
  <path d="M 630 205 L 670 205" stroke="#18181b" stroke-width="2" stroke-linecap="round"/>
  <path d="M 630 235 L 670 235" stroke="#18181b" stroke-width="2" stroke-linecap="round"/>
  <path d="M 630 265 L 670 265" stroke="#18181b" stroke-width="2" stroke-linecap="round"/>
  <!-- Arm holding clipboard -->
  <path d="M 635 200 C 620 210, 610 215, 605 220" fill="none" stroke="#18181b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Clipboard -->
  <rect x="580" y="222" width="28" height="38" rx="2" fill="#ffffff" stroke="#18181b" stroke-width="2" transform="rotate(-15 594 241)"/>
  <path d="M 588 230 L 602 226" stroke="#18181b" stroke-width="2" stroke-linecap="round" transform="rotate(-15 594 241)"/> <!-- Clipboard Clip -->
  <circle cx="604" cy="222" r="4.5" fill="#ffffff" stroke="#18181b" stroke-width="1.5"/> <!-- Hand -->
  <!-- Head -->
  <circle cx="650" cy="160" r="16" fill="#ffffff" stroke="#18181b" stroke-width="2.5"/>
  <!-- Cap (EMT cap) -->
  <path d="M 666 158 A 16 16 0 0 0 634 158 L 626 158" fill="none" stroke="#18181b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Eye & calm look -->
  <circle cx="644" cy="160" r="1" fill="#18181b"/>
  <path d="M 643 166 Q 641 168 639 165" fill="none" stroke="#18181b" stroke-width="1.5" stroke-linecap="round"/>

</svg>